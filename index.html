<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState,useRef,useEffect} = React;

/* ━━━━ CONFIG ━━━━ */
// Replace with your Cloudflare Worker URL when ready
const API_URL = 'https://sheetsnap-api.will-6d6.workers.dev';

/* ━━━━ STORAGE ━━━━ */
const store = {
  get: k => { try { const v=localStorage.getItem(k); return v?JSON.parse(v):null } catch(e){ return null }},
  set: (k,v) => { try { localStorage.setItem(k,JSON.stringify(v)) } catch(e){} },
};

/* ━━━━ THEMES ━━━━ */
const THEMES = {
  darkGold:{name:"Dark Gold",icon:"#D4A843",bg:"#0A0A0C",surface:"#131316",border:"rgba(212,168,67,0.10)",borderLight:"rgba(212,168,67,0.18)",accent:"#D4A843",accentBright:"#F0CC6B",accentDim:"#A88A3D",accentFaint:"rgba(212,168,67,0.06)",text:"#F2E8D4",textSoft:"rgba(242,232,212,0.85)",textMuted:"rgba(242,232,212,0.45)",green:"#5BBA6F",yellow:"#E5A538"},
  silverIce:{name:"Silver & Ice",icon:"#8AB4CC",bg:"#080B0E",surface:"#0F1318",border:"rgba(138,180,204,0.10)",borderLight:"rgba(138,180,204,0.18)",accent:"#8AB4CC",accentBright:"#B0D4E8",accentDim:"#6A94AC",accentFaint:"rgba(138,180,204,0.06)",text:"#E0E8EF",textSoft:"rgba(224,232,239,0.85)",textMuted:"rgba(224,232,239,0.45)",green:"#5BBA6F",yellow:"#E5A538"},
  crimson:{name:"Crimson",icon:"#C45A5A",bg:"#0C0808",surface:"#161010",border:"rgba(196,90,90,0.10)",borderLight:"rgba(196,90,90,0.18)",accent:"#C45A5A",accentBright:"#E07A7A",accentDim:"#9A4444",accentFaint:"rgba(196,90,90,0.06)",text:"#F0E0DC",textSoft:"rgba(240,224,220,0.85)",textMuted:"rgba(240,224,220,0.45)",green:"#5BBA6F",yellow:"#E5A538"},
  arcaneViolet:{name:"Arcane Violet",icon:"#9B7ACC",bg:"#0A080E",surface:"#121018",border:"rgba(155,122,204,0.10)",borderLight:"rgba(155,122,204,0.18)",accent:"#9B7ACC",accentBright:"#BAA0E0",accentDim:"#7A5AAC",accentFaint:"rgba(155,122,204,0.06)",text:"#E8E0F2",textSoft:"rgba(232,224,242,0.85)",textMuted:"rgba(232,224,242,0.45)",green:"#5BBA6F",yellow:"#E5A538"},
};

/* ━━━━ EXTRACTION PROMPT ━━━━ */
const PROMPT = `You are SheetSnap's extraction engine. You are looking at a photographed tabletop RPG character sheet.

Extract every piece of information into structured JSON.

RULES:
1. NEVER GUESS. NEVER INFER. If unreadable, value is "UNREADABLE".
2. Read what is WRITTEN, not what SHOULD be there. Never correct math.
3. Extract sections AS TITLED ON THE SHEET.
4. Extract fields AS LABELED ON THE SHEET.
5. Multiple values for one field = separate fields.
6. Crossed-out values: extract most recent. If unclear, confidence "low".
7. Readable = "high". Uncertain = "low". Unreadable = "UNREADABLE".

RESPOND WITH ONLY THIS JSON (no markdown, no explanation):
{"name":"Character Name","name_confidence":"high","system":"Game System","system_confidence":"high","sections":[{"id":"snake_case","title":"Section Title","fields":[{"id":"field_id","label":"Label","value":"Value","confidence":"high"}]}]}

Empty fields: value "" confidence "high". Checkboxes: "checked"/"unchecked". Lists: each item own field. Order: top-to-bottom, left-to-right.`;

/* ━━━━ DEMO DATA ━━━━ */
const DEMO_DATA = {name:"Shalden Silverpaw",name_confidence:"high",system:"Palladium RPG",system_confidence:"high",sections:[{id:"identity",title:"Character Info",fields:[{id:"race",label:"Race",value:"Hengeyokai",confidence:"high"},{id:"occupation",label:"Occupation",value:"Thief - Arcane Trickster",confidence:"high"},{id:"alignment",label:"Alignment",value:"Anarchist",confidence:"high"},{id:"hit_points",label:"Hit Points",value:"31",confidence:"high"},{id:"exp_level",label:"Experience Level",value:"3",confidence:"high"},{id:"exp_points",label:"Exp",value:"4200",confidence:"high"},{id:"age",label:"Age",value:"25",confidence:"high"},{id:"sex",label:"Sex",value:"Male",confidence:"high"},{id:"weight",label:"Weight",value:"180",confidence:"high"},{id:"height",label:"Height",value:"6'",confidence:"high"},{id:"land_of_origin",label:"Land Of Origin",value:"Brickell",confidence:"high"},{id:"boss",label:"(Boss)",value:"\"Kor\"",confidence:"high"},{id:"birth_order",label:"Birth Order",value:"Unknown",confidence:"high"},{id:"disposition",label:"Disposition",value:"",confidence:"high"}]},{id:"attributes",title:"Attributes",fields:[{id:"iq",label:"I.Q.",value:"21",confidence:"high"},{id:"me",label:"M.E.",value:"12",confidence:"high"},{id:"ma",label:"M.A.",value:"8",confidence:"high"},{id:"ps",label:"P.S.",value:"9",confidence:"high"},{id:"pp",label:"P.P.",value:"23",confidence:"high"},{id:"pe",label:"P.E.",value:"15",confidence:"high"},{id:"pb",label:"P.B.",value:"8",confidence:"high"},{id:"spd",label:"Spd",value:"15",confidence:"high"}]},{id:"occ_skills",title:"O.C.C. Skills",fields:[{id:"hth_thief",label:"HtH Thief",value:"3",confidence:"high"},{id:"lang_thieves_cant",label:"Lang:Thieves Cant",value:"94%",confidence:"high"},{id:"scale_walls",label:"Scale Walls",value:"60%",confidence:"high"},{id:"locate_secret_doors",label:"Locate Secret Doors",value:"31%",confidence:"high"},{id:"recognize_poison",label:"Recognize Poison",value:"35%",confidence:"high"},{id:"pick_locks",label:"Pick Locks",value:"42%",confidence:"high"},{id:"prowl",label:"Prowl",value:"57%",confidence:"high"},{id:"pick_pockets",label:"Pick Pockets",value:"44%",confidence:"high"}]},{id:"elective_skills",title:"Elective Skills",fields:[{id:"wp_cross_bow",label:"WP Cross Bow",value:"3",confidence:"high"},{id:"wp_staves",label:"WP Staves",value:"3",confidence:"high"},{id:"wp_grappling_hook",label:"WP Grappling Hook",value:"3",confidence:"high"},{id:"acrobatics",label:"Acrobatics",value:"3",confidence:"high"},{id:"climb_overhangs",label:"Climb Overhangs",value:"55%",confidence:"high"},{id:"streetwise",label:"Streetwise",value:"32%",confidence:"high"},{id:"sleight_of_hand",label:"Sleight of Hand",value:"38%",confidence:"high"}]},{id:"secondary_skills",title:"Secondary Skills",fields:[{id:"rec_metals_stones",label:"Rec. Metals/Stones",value:"35%",confidence:"high"},{id:"ventriloquism",label:"Ventriloquism",value:"41%",confidence:"high"},{id:"imitate_voices",label:"Imitate Voices",value:"47%",confidence:"high"},{id:"mathematics",label:"Mathematics",value:"47%",confidence:"high"},{id:"swim",label:"Swim",value:"52%",confidence:"high"},{id:"sense_of_direction",label:"Sense of Direction",value:"62%",confidence:"high"},{id:"rope_works",label:"Rope Works",value:"49%",confidence:"high"}]},{id:"combat_skills",title:"Combat: Hand to Hand — Thief",fields:[{id:"num_attacks",label:"Number of Attacks",value:"2",confidence:"high"},{id:"strike",label:"Strike",value:"",confidence:"high"},{id:"parry",label:"Parry",value:"2",confidence:"high"},{id:"dodge",label:"Dodge",value:"2",confidence:"high"},{id:"damage",label:"Damage",value:"",confidence:"high"},{id:"stun",label:"Stun",value:"",confidence:"high"},{id:"critical",label:"Critical",value:"",confidence:"high"},{id:"kick",label:"Kick",value:"1-6",confidence:"high"},{id:"sneak_attack",label:"Sneak Attack",value:"+2d6, Evasion, Uncanny Dodge",confidence:"high"},{id:"bonuses",label:"Bonuses to Save",value:"P.P. = +4 Parry, Dodge, Strike. Evasion Ability",confidence:"high"}]},{id:"weapon_profs",title:"Weapon Proficiencies",fields:[{id:"crossbow",label:"Cross Bow",value:"S:1 R:2",confidence:"high"},{id:"staves",label:"Staves",value:"S:2 P:1",confidence:"high"},{id:"grappling_hook",label:"Grappling Hook",value:"S:1 P:1 Thr:1",confidence:"high"}]},{id:"weapons",title:"Weapons",fields:[{id:"weapon_1",label:"Weapon",value:"Staff",confidence:"high"},{id:"weapon_2",label:"Weapon",value:"Hand Crossbow - 13 Bolts",confidence:"high"},{id:"weapon_3",label:"Weapon",value:"G. Hook - 120' Thieves Rope",confidence:"high"}]},{id:"armor",title:"Armor",fields:[{id:"armor_type",label:"Type",value:"Soft Leather (FS)",confidence:"high"},{id:"ar",label:"A.R.",value:"9",confidence:"high"},{id:"sdc",label:"S.D.C.",value:"",confidence:"high"}]},{id:"equipment",title:"Equipment",fields:[{id:"e1",label:"Item",value:"Backpack",confidence:"high"},{id:"e2",label:"Item",value:"Thieves' Tools",confidence:"high"},{id:"e3",label:"Item",value:"Water Skin 1/2 Gallon",confidence:"high"},{id:"e4",label:"Item",value:"Small Mirror",confidence:"high"},{id:"e5",label:"Item",value:"Winter Cloak",confidence:"high"},{id:"e6",label:"Item",value:"Small Marble Elephant",confidence:"high"}]},{id:"valuables",title:"Valuables",fields:[{id:"gold",label:"Gold",value:"9",confidence:"high"},{id:"jewels",label:"Jewels",value:"",confidence:"high"}]},{id:"magic_items",title:"Magic Items",fields:[{id:"m1",label:"Item",value:"Small Bag of Holding",confidence:"high"},{id:"m2",label:"Item",value:"10 Madcap Mushrooms",confidence:"high"}]},{id:"spells",title:"Spells",fields:[{id:"c1",label:"Cantrip",value:"Mage Hand",confidence:"high"},{id:"c2",label:"Cantrip",value:"Prestidigitation",confidence:"high"},{id:"c3",label:"Cantrip",value:"Minor Illusion",confidence:"high"},{id:"c4",label:"Cantrip",value:"Stick",confidence:"low"},{id:"s1",label:"Lv 1 Spell",value:"Silent Image",confidence:"high"},{id:"s2",label:"Lv 1 Spell",value:"Snapshot",confidence:"low"},{id:"s3",label:"Lv 1 Spell",value:"Zephyr's Strike",confidence:"high"}]},{id:"notes",title:"Notes",fields:[{id:"n1",label:"Note",value:"Nightvision 90'",confidence:"high"},{id:"n2",label:"Note",value:"Dodge/Parry +6",confidence:"high"},{id:"n3",label:"Note",value:"Staves +6 Strike, Crossbow +5 Strike, Grappling Hook +5 Strike/+5 Throw",confidence:"high"}]}]};

/* ━━━━ ICONS ━━━━ */
const BackIcon=({T})=><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M12 4L6 10L12 16" stroke={T.text} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>;
const CameraIcon=({T})=><svg width="26" height="26" viewBox="0 0 28 28" fill="none"><path d="M10.5 4.5L8.5 7.5H5C3.9 7.5 3 8.4 3 9.5V21.5C3 22.6 3.9 23.5 5 23.5H23C24.1 23.5 25 22.6 25 21.5V9.5C25 8.4 24.1 7.5 23 7.5H19.5L17.5 4.5H10.5Z" stroke={T.accent} strokeWidth="1.5" strokeLinejoin="round"/><circle cx="14" cy="15" r="4.5" stroke={T.accent} strokeWidth="1.5"/></svg>;
const UploadIcon=({T})=><svg width="26" height="26" viewBox="0 0 28 28" fill="none"><rect x="3" y="5" width="22" height="18" rx="3" stroke={T.accent} strokeWidth="1.5"/><circle cx="9" cy="12" r="2" stroke={T.accent} strokeWidth="1.2"/><path d="M3 19l6-5 4 3 5-6 7 8" stroke={T.accent} strokeWidth="1.2" strokeLinejoin="round" fill="none"/></svg>;
const CheckIcon=()=><svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M5 10.5L8.5 14L15 6" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg>;

/* ━━━━ SMALL COMPONENTS ━━━━ */
const Dot=({c,T,s})=><span style={{display:"inline-block",width:7,height:7,borderRadius:"50%",background:c==="low"?T.yellow:T.green,flexShrink:0,...s}}/>;
const Footer=({T})=><div style={{textAlign:"center",padding:"24px 0 8px"}}><div style={{width:50,height:1,background:`linear-gradient(90deg,transparent,${T.accent},transparent)`,margin:"0 auto 14px",opacity:0.3}}/><span style={{fontSize:10,color:T.textMuted,letterSpacing:2.5,fontFamily:"'Cinzel',Georgia,serif"}}>DEVELOPED BY</span><div style={{fontSize:18,color:T.accent,fontFamily:"'Cinzel',Georgia,serif",fontWeight:700,marginTop:2}}>DigiRune Studios</div><div style={{fontSize:10,color:T.textMuted,marginTop:4,opacity:0.5}}>App © DigiRune Studios</div></div>;
const Logo=({T,size=28})=><div style={{display:"flex",justifyContent:"center"}}><span style={{fontSize:size,fontWeight:700,fontFamily:"'Cinzel',Georgia,serif",color:T.text,letterSpacing:1}}>Sheet</span><span style={{fontSize:size,fontWeight:700,fontFamily:"'Cinzel',Georgia,serif",color:T.accent,letterSpacing:1}}>Snap</span></div>;

const MoveBtn=({T,onClick,children,disabled})=><button onClick={onClick} disabled={disabled} style={{background:"none",border:"none",cursor:disabled?"default":"pointer",fontSize:10,color:disabled?"transparent":T.textMuted,padding:"1px 3px",lineHeight:1,opacity:disabled?0:0.7}}>{children}</button>;
const MoveButtons=({T,si,fi,total,moveField})=><div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flexShrink:0,gap:0}}><MoveBtn T={T} onClick={()=>moveField(si,fi,-1)} disabled={fi===0}>▲</MoveBtn><MoveBtn T={T} onClick={()=>moveField(si,fi,1)} disabled={fi===total-1}>▼</MoveBtn></div>;

/* ━━━━ EDITABLE COMPONENTS ━━━━ */
function EditableValue({value,onChange,T,style:sx,placeholder}){
  const[ed,setEd]=useState(false);const[d,setD]=useState(value);const r=useRef(null);
  useEffect(()=>{if(ed&&r.current)r.current.focus()},[ed]);
  useEffect(()=>{setD(value)},[value]);
  if(ed)return<input ref={r} value={d} onChange={e=>setD(e.target.value)} onBlur={()=>{onChange(d);setEd(false)}} onKeyDown={e=>{if(e.key==="Enter"){onChange(d);setEd(false)}}} style={{fontSize:15,color:T.text,background:T.accentFaint,border:`1px solid ${T.borderLight}`,borderRadius:6,padding:"4px 8px",outline:"none",width:"100%",fontFamily:"'EB Garamond',Georgia,serif",...sx}}/>;
  return<span onClick={()=>setEd(true)} style={{cursor:"pointer",padding:"2px 0",minHeight:22,display:"inline-block",fontSize:15,color:value?T.text:T.textMuted,fontStyle:value?"normal":"italic",borderBottom:`1px dashed ${T.border}`,...sx}}>{value||placeholder||"Tap to edit"}</span>;
}

function EditableLabel({value,onChange,T}){
  const[ed,setEd]=useState(false);const[d,setD]=useState(value);const r=useRef(null);
  useEffect(()=>{if(ed&&r.current)r.current.focus()},[ed]);
  if(ed)return<input ref={r} value={d} onChange={e=>setD(e.target.value)} onBlur={()=>{onChange(d);setEd(false)}} onKeyDown={e=>{if(e.key==="Enter"){onChange(d);setEd(false)}}} style={{fontSize:12,color:T.textMuted,background:T.accentFaint,border:`1px solid ${T.borderLight}`,borderRadius:4,padding:"2px 6px",outline:"none",fontFamily:"'EB Garamond',Georgia,serif",width:"100%"}}/>;
  return<span onClick={()=>setEd(true)} style={{fontSize:12,color:T.textMuted,cursor:"pointer",letterSpacing:0.3}}>{value}</span>;
}

/* ━━━━ SIGN IN ━━━━ */
function SignInScreen({T,onSignIn}){
  return<div style={{minHeight:"100vh",display:"flex",flexDirection:"column",background:T.bg}}>
    <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px 28px",gap:28}}>
      <div style={{textAlign:"center"}}><Logo T={T} size={36}/><div style={{fontSize:14,color:T.accent,fontStyle:"italic",marginTop:4,opacity:0.8}}>From paper to pocket.</div></div>
      <p style={{fontSize:17,color:T.textSoft,textAlign:"center",margin:0,maxWidth:300,lineHeight:1.6}}>Photograph any character sheet. Get a digital character in seconds.</p>
      <div style={{display:"flex",flexDirection:"column",gap:12,width:"100%",maxWidth:320}}>
        <button onClick={onSignIn} style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,padding:"16px 20px",background:"#fff",border:"none",borderRadius:12,cursor:"pointer",width:"100%"}}>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="#000"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.53 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
          <span style={{fontSize:17,fontWeight:600,color:"#000"}}>Continue with Apple</span>
        </button>
        <button onClick={onSignIn} style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,padding:"16px 20px",background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,cursor:"pointer",width:"100%"}}>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          <span style={{fontSize:17,fontWeight:600,color:T.text}}>Continue with Google</span>
        </button>
      </div>
      <p style={{fontSize:14,color:T.textMuted,textAlign:"center",margin:0,maxWidth:300,lineHeight:1.5,fontStyle:"italic"}}>Your data stays yours. No ads. No subscriptions. Ever.</p>
    </div>
    <Footer T={T}/>
  </div>;
}

/* ━━━━ HOME SCREEN ━━━━ */
function HomeScreen({T,characters,fallenHeroes,onStartCapture,onOpenChar,onOpenFallen,onDeleteChar,onArchiveChar,onRestoreChar,onDeleteFallen}){
  const[showFallen,setShowFallen]=useState(false);
  return<div style={{minHeight:"100vh",display:"flex",flexDirection:"column",background:T.bg}}>
    <div style={{textAlign:"center",padding:"20px 20px 14px",borderBottom:`1px solid ${T.border}`}}><Logo T={T}/><div style={{fontSize:14,color:T.accent,fontStyle:"italic",marginTop:2,opacity:0.8}}>From paper to pocket.</div></div>
    <div style={{flex:1,padding:"20px 22px",display:"flex",flexDirection:"column",gap:18,overflowY:"auto"}}>
      {characters.length>0&&<div style={{display:"flex",flexDirection:"column",gap:8}}>
        <span style={{fontSize:14,color:T.textMuted,letterSpacing:1.5,fontFamily:"'Cinzel',Georgia,serif"}}>YOUR CHARACTERS</span>
        {characters.map((c,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:0}}>
          <button onClick={()=>onOpenChar(i)} style={{flex:1,display:"flex",alignItems:"center",gap:14,padding:"14px 16px",background:T.surface,border:`1px solid ${T.border}`,borderRadius:"12px 0 0 12px",cursor:"pointer",textAlign:"left"}}>
            <div style={{width:44,height:44,borderRadius:12,background:T.accentFaint,border:`1px solid ${T.border}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><span style={{fontSize:20,fontWeight:700,color:T.accent,fontFamily:"'Cinzel',Georgia,serif"}}>{c.name.charAt(0)}</span></div>
            <div style={{flex:1}}><div style={{fontSize:18,fontWeight:700,color:T.text,fontFamily:"'Cinzel',Georgia,serif"}}>{c.name}</div><div style={{fontSize:14,color:T.accentDim}}>{c.system}</div></div>
          </button>
          <button onClick={()=>onArchiveChar(i)} style={{padding:"14px 10px",background:T.surface,border:`1px solid ${T.border}`,borderLeft:"none",cursor:"pointer",fontSize:14,color:T.textMuted,alignSelf:"stretch",display:"flex",alignItems:"center"}} title="Archive">⚔</button>
          <button onClick={()=>onDeleteChar(i)} style={{padding:"14px 10px",background:T.surface,border:`1px solid ${T.border}`,borderLeft:"none",borderRadius:"0 12px 12px 0",cursor:"pointer",fontSize:14,color:T.textMuted,alignSelf:"stretch",display:"flex",alignItems:"center"}} title="Delete">✕</button>
        </div>)}
      </div>}
      <h1 style={{fontSize:26,fontWeight:700,fontFamily:"'Cinzel',Georgia,serif",color:T.text,margin:0,textAlign:"center"}}>{characters.length>0?"Add Another Character":"Scan Your Character"}</h1>
      <p style={{fontSize:17,lineHeight:1.6,color:T.textSoft,margin:0,textAlign:"center",maxWidth:360,alignSelf:"center"}}>Upload your character sheet pages — any game, any system. Your character lives on your device.</p>
      <div style={{display:"flex",flexDirection:"column",gap:12,marginTop:8}}>
        <button onClick={()=>onStartCapture("camera")} style={{display:"flex",alignItems:"center",gap:16,padding:"18px 20px",background:T.surface,border:`1px solid ${T.border}`,borderRadius:14,cursor:"pointer",textAlign:"left"}}>
          <div style={{width:48,height:48,borderRadius:12,background:T.accentFaint,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><CameraIcon T={T}/></div>

        </button>

/* ━━━━ PROCESSING SCREEN ━━━━ */
function ProcessingScreen({T,images,demoData,onComplete,onError}){
  const[step,setStep]=useState(0);const[error,setError]=useState(null);const ran=useRef(false);
  useEffect(()=>{
    if(ran.current)return;ran.current=true;
    if(demoData){setTimeout(()=>setStep(1),600);setTimeout(()=>setStep(2),2000);setTimeout(()=>setStep(3),3500);setTimeout(()=>onComplete(JSON.parse(JSON.stringify(demoData))),4500);return}
    (async()=>{
      try{setStep(1);
        const content=[];images.forEach((img,i)=>{content.push({type:"image",source:{type:"base64",media_type:img.dataUrl.split(";")[0].split(":")[1],data:img.dataUrl.split(",")[1]}});if(images.length>1)content.push({type:"text",text:`(Page ${i+1} of ${images.length} of the SAME character sheet.)`})});
        content.push({type:"text",text:PROMPT});setStep(2);
        const res=await fetch(API_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:4096,messages:[{role:"user",content}]})});
        if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error?.message||`API ${res.status}`)}
        const data=await res.json();const text=data.content.filter(b=>b.type==="text").map(b=>b.text).join("");setStep(3);
        const parsed=JSON.parse(text.replace(/```json\s*/g,"").replace(/```\s*/g,"").trim());
        if(!parsed.name||!parsed.sections)throw new Error("Invalid extraction");
        setTimeout(()=>onComplete(parsed),800);
      }catch(err){setError(err.message)}
    })();
  },[]);
  const steps=[{label:"Reading your character sheets...",done:step>1},{label:"Extracting stats and abilities...",done:step>2},{label:"Building your digital character...",done:false}];
  if(error)return<div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:T.bg,padding:"40px 28px",gap:20}}><Logo T={T}/><div style={{padding:"16px 20px",background:"rgba(217,79,79,0.1)",border:"1px solid rgba(217,79,79,0.3)",borderRadius:12,maxWidth:320,textAlign:"center"}}><div style={{fontSize:17,color:"#F2A0A0",lineHeight:1.5}}>{error}</div></div><button onClick={onError} style={{padding:"14px 28px",background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,cursor:"pointer",fontSize:16,color:T.text}}>Try Again</button></div>;
  return<div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:T.bg,padding:"40px 28px",gap:36}}>
    <Logo T={T}/>
    <div style={{display:"flex",flexDirection:"column",gap:20,width:"100%",maxWidth:320}}>{steps.map((st,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:14,opacity:i<=step?1:0.25,transition:"opacity 0.6s ease"}}><div style={{width:32,height:32,borderRadius:"50%",border:`2px solid ${st.done?T.green:i===step?T.accent:T.border}`,background:st.done?T.green:"none",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all 0.5s ease",boxShadow:i===step&&!st.done?`0 0 12px ${T.accent}40`:"none"}}>{st.done&&<CheckIcon/>}</div><span style={{fontSize:17,color:i<=step?T.text:T.textMuted,transition:"color 0.5s ease"}}>{st.label}</span></div>)}</div>
    <div style={{width:"100%",maxWidth:320,height:3,background:T.accentFaint,borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:step===0?"10%":step===1?"35%":step===2?"70%":"95%",background:`linear-gradient(90deg,${T.accent},${T.accentBright})`,borderRadius:2,transition:"width 1.5s ease-out"}}/></div>
    <p style={{fontSize:16,color:T.textMuted,margin:0,fontStyle:"italic"}}>This usually takes just a few seconds.</p>
  </div>;
}

/* ━━━━ SECTION BLOCK ━━━━ */

      {style==="grid"&&<div style={{display:"flex",flexWrap:"wrap",gap:8}}>{sec.fields.map((f,fi)=><div key={f.id} style={{flex:"1 1 22%",minWidth:68,background:T.surface,border:`1px solid ${T.border}`,borderRadius:10,padding:"8px 6px",textAlign:"center",position:"relative"}}><button onClick={()=>removeField(si,fi)} style={{position:"absolute",top:2,right:4,background:"none",border:"none",cursor:"pointer",fontSize:11,color:T.textMuted}}>✕</button><EditableLabel value={f.label} onChange={v=>updateField(si,fi,"label",v)} T={T}/><EditableValue value={f.value} onChange={v=>updateField(si,fi,"value",v)} T={T} style={{fontSize:24,fontWeight:700,fontFamily:"'Cinzel',Georgia,serif",display:"block",textAlign:"center",borderBottom:"none",marginTop:2}}/></div>)}</div>}
      {style==="skills"&&sec.fields.map((f,fi)=>{const pct=parseInt(f.value);const isPct=!isNaN(pct)&&f.value.includes("%");return<div key={f.id} style={{padding:"5px 0"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:2}}><span style={{display:"flex",alignItems:"center",gap:4,flex:1}}><MoveButtons T={T} si={si} fi={fi} total={sec.fields.length} moveField={moveField}/><Dot c={f.confidence} T={T}/><EditableLabel value={f.label} onChange={v=>updateField(si,fi,"label",v)} T={T}/></span><div style={{display:"flex",alignItems:"center",gap:4}}><EditableValue value={f.value} onChange={v=>updateField(si,fi,"value",v)} T={T} style={{fontSize:14,fontWeight:600,color:T.accent,textAlign:"right",maxWidth:60}}/><button onClick={()=>removeField(si,fi)} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:T.textMuted}}>✕</button></div></div>{isPct&&<div style={{height:3,background:T.accentFaint,borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.min(pct,100)}%`,background:`linear-gradient(90deg,${T.accentDim},${T.accent})`,borderRadius:2}}/></div>}</div>})}

/* ━━━━ CHARACTER SCREEN ━━━━ */
function CharacterScreen({T,character,isFallen,onBack,onSave,onArchive,themeKey,setThemeKey}){
  const[data,setData]=useState(JSON.parse(JSON.stringify(character)));
  const[noteInput,setNoteInput]=useState("");const noteRef=useRef(null);
  const save=()=>{onSave(data);onBack()};
  const addNote=()=>{if(!noteInput.trim())return;setData(p=>({...p,sessionNotes:[...(p.sessionNotes||[]),{id:`n_${Date.now()}`,text:noteInput.trim(),timestamp:new Date().toISOString()}]}));setNoteInput("")};
  const removeNote=nid=>{setData(p=>({...p,sessionNotes:(p.sessionNotes||[]).filter(n=>n.id!==nid)}))};
  const updateField=(si,fi,key,val)=>{setData(p=>{const n=JSON.parse(JSON.stringify(p));n.sections[si].fields[fi][key]=val;if(key==="value")n.sections[si].fields[fi].confidence="high";return n})};
  const removeField=(si,fi)=>{setData(p=>{const n=JSON.parse(JSON.stringify(p));n.sections[si].fields.splice(fi,1);return n})};
  const moveField=(si,fi,dir)=>{setData(p=>{const n=JSON.parse(JSON.stringify(p));const f=n.sections[si].fields;const ni=fi+dir;if(ni<0||ni>=f.length)return n;[f[fi],f[ni]]=[f[ni],f[fi]];return n})};
  const addField=si=>{setData(p=>{const n=JSON.parse(JSON.stringify(p));n.sections[si].fields.push({id:`f_${Date.now()}`,label:"New Field",value:"",confidence:"high"});return n})};
  const updateSectionTitle=(si,t)=>{setData(p=>{const n=JSON.parse(JSON.stringify(p));n.sections[si].title=t;return n})};
  const removeSection=si=>{setData(p=>{const n=JSON.parse(JSON.stringify(p));n.sections.splice(si,1);return n})};
  const moveSection=(si,dir)=>{setData(p=>{const n=JSON.parse(JSON.stringify(p));const ni=si+dir;if(ni<0||ni>=n.sections.length)return n;[n.sections[si],n.sections[ni]]=[n.sections[ni],n.sections[si]];return n})};
  const addSection=()=>{setData(p=>{const n=JSON.parse(JSON.stringify(p));n.sections.push({id:`sec_${Date.now()}`,title:"New Section",fields:[{id:`f_${Date.now()}`,label:"New Field",value:"",confidence:"high"}]});return n})};
  const updateName=v=>setData(p=>({...p,name:v,name_confidence:"high"}));
  const updateSystem=v=>setData(p=>({...p,system:v,system_confidence:"high"}));
  const getSectionStyle=sec=>{if(sec.fields.length<=8&&sec.fields.every(f=>!f.value.includes("%")&&f.value.length<6&&f.label.length<8))return"grid";if(sec.fields.some(f=>f.value.includes("%")))return"skills";if(sec.id==="spells"||sec.title.toLowerCase().includes("spell"))return"spells";return"default"};
  const totalFields=data.sections.reduce((a,s)=>a+s.fields.length,0);

  return<div style={{minHeight:"100vh",display:"flex",flexDirection:"column",background:T.bg}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",borderBottom:`1px solid ${T.border}`}}>
      <button onClick={save} style={{display:"flex",alignItems:"center",gap:4,background:"none",border:"none",cursor:"pointer"}}><BackIcon T={T}/><span style={{fontSize:15,color:T.textMuted}}>Save & Back</span></button>
      <div style={{display:"flex",gap:8}}>{Object.entries(THEMES).map(([key,theme])=><button key={key} onClick={()=>setThemeKey(key)} style={{width:key===themeKey?20:16,height:key===themeKey?20:16,borderRadius:"50%",border:key===themeKey?`2px solid ${theme.icon}`:`1px solid rgba(255,255,255,0.15)`,background:theme.icon,cursor:"pointer",transition:"all 0.2s ease",boxShadow:key===themeKey?`0 0 8px ${theme.icon}40`:"none"}} title={theme.name}/>)}</div>
    </div>
    <div style={{flex:1,padding:"16px 16px 40px",display:"flex",flexDirection:"column",gap:12,overflowY:"auto"}}>
      {/* Hero */}
      <div style={{background:`linear-gradient(135deg,${T.surface} 0%,${T.accentFaint} 100%)`,border:`1px solid ${T.borderLight}`,borderRadius:16,padding:"18px 16px",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:-20,right:-20,width:80,height:80,background:`radial-gradient(circle,${T.accentFaint} 0%,transparent 70%)`,borderRadius:"50%"}}/>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <div style={{width:56,height:56,borderRadius:14,background:`linear-gradient(135deg,${T.accentFaint},rgba(255,255,255,0.02))`,border:`1px solid ${T.borderLight}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><span style={{fontSize:26,fontWeight:700,color:T.accent,fontFamily:"'Cinzel',Georgia,serif"}}>{data.name.charAt(0)||"?"}</span></div>
          <div style={{flex:1}}><div style={{display:"flex",alignItems:"center",gap:6}}><EditableValue value={data.name} onChange={updateName} T={T} style={{fontSize:22,fontWeight:700,fontFamily:"'Cinzel',Georgia,serif",lineHeight:1.15,borderBottom:"none"}}/><Dot c={data.name_confidence} T={T}/></div><div style={{display:"flex",alignItems:"center",gap:6,marginTop:3}}><EditableValue value={data.system} onChange={updateSystem} T={T} style={{fontSize:14,color:T.accentDim,borderBottom:"none"}}/><Dot c={data.system_confidence} T={T} s={{width:6,height:6}}/></div></div>
        </div>
      </div>
      {/* Legend */}
      <div style={{display:"flex",gap:14,padding:"0 4px",flexWrap:"wrap"}}><div style={{display:"flex",alignItems:"center",gap:5,fontSize:12,color:T.textMuted}}><Dot c="high" T={T}/> Confident</div><div style={{display:"flex",alignItems:"center",gap:5,fontSize:12,color:T.textMuted}}><Dot c="low" T={T}/> Verify</div><span style={{fontSize:12,color:T.textMuted,marginLeft:"auto"}}>{totalFields} fields</span></div>
      {/* Sections */}
      {data.sections.map((sec,si)=>{const style=getSectionStyle(sec);return<SectionBlock key={sec.id} sec={sec} si={si} style={style} T={T} updateField={updateField} removeField={removeField} moveField={moveField} addField={addField} updateSectionTitle={updateSectionTitle} removeSection={removeSection} moveSection={moveSection} totalSections={data.sections.length}/>})}
      <button onClick={addSection} style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,padding:"14px",background:"none",border:`1px dashed ${T.borderLight}`,borderRadius:12,cursor:"pointer",width:"100%"}}><span style={{fontSize:16,color:T.accentDim}}>+ Add Section</span></button>
      {/* Session Notes */}
      <div style={{background:T.surface,borderRadius:12,border:`1px solid ${T.border}`,overflow:"hidden"}}><div style={{padding:"14px 16px",borderBottom:`1px solid ${T.border}`}}><span style={{fontSize:16,fontWeight:700,color:T.accent,fontFamily:"'Cinzel',Georgia,serif"}}>Session Notes</span></div><div style={{padding:"12px 14px",display:"flex",flexDirection:"column",gap:10}}>
        <div style={{display:"flex",gap:8}}><input ref={noteRef} value={noteInput} onChange={e=>setNoteInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")addNote()}} placeholder="Add a session note..." style={{flex:1,fontSize:15,color:T.text,background:T.accentFaint,border:`1px solid ${T.borderLight}`,borderRadius:8,padding:"10px 12px",outline:"none",fontFamily:"'EB Garamond',Georgia,serif"}}/><button onClick={addNote} style={{padding:"10px 16px",background:`linear-gradient(135deg,${T.accent},${T.accentBright})`,border:"none",borderRadius:8,cursor:"pointer",fontSize:14,fontWeight:700,color:T.bg,fontFamily:"'Cinzel',Georgia,serif",flexShrink:0}}>+</button></div>
        {(data.sessionNotes||[]).length===0&&<p style={{fontSize:14,color:T.textMuted,fontStyle:"italic",margin:0,textAlign:"center",padding:"8px 0"}}>No notes yet. Add your first after a session.</p>}
        {[...(data.sessionNotes||[])].reverse().map(note=><div key={note.id} style={{padding:"10px 12px",background:T.accentFaint,borderRadius:8,border:`1px solid ${T.border}`}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}><div style={{flex:1}}><div style={{fontSize:11,color:T.accentDim,marginBottom:4,fontFamily:"'Cinzel',Georgia,serif",letterSpacing:0.5}}>{new Date(note.timestamp).toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric",year:"numeric"})} · {new Date(note.timestamp).toLocaleTimeString(undefined,{hour:"numeric",minute:"2-digit"})}</div><div style={{fontSize:15,color:T.text,lineHeight:1.5}}>{note.text}</div></div><button onClick={()=>removeNote(note.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:T.textMuted,padding:"2px",flexShrink:0}}>✕</button></div></div>)}
      </div></div>
      {/* Archive */}
      {isFallen?<div style={{padding:"14px 16px",background:"rgba(255,255,255,0.03)",border:`1px solid ${T.border}`,borderRadius:12,textAlign:"center"}}><span style={{fontSize:14,color:T.textMuted,fontStyle:"italic"}}>⚔ This character rests in the Fallen Heroes archive</span></div>
      :onArchive&&<button onClick={()=>{onSave(data);onArchive()}} style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,padding:"14px",background:"none",border:"1px solid rgba(196,90,90,0.2)",borderRadius:12,cursor:"pointer",width:"100%"}}><span style={{fontSize:15,color:"rgba(196,90,90,0.7)"}}>⚔ Archive to Fallen Heroes</span></button>}
      <Footer T={T}/>
    </div>
  </div>;
}

/* ━━━━ MAIN APP ━━━━ */
function SheetSnap(){
  const[view,setView]=useState("loading");
  const[themeKey,setThemeKey]=useState("darkGold");
  const[characters,setCharacters]=useState([]);
  const[fallenHeroes,setFallenHeroes]=useState([]);
  const[activeCharIdx,setActiveCharIdx]=useState(null);
  const[activeIsFallen,setActiveIsFallen]=useState(false);
  const[captureImages,setCaptureImages]=useState([]);
  const[demoMode,setDemoMode]=useState(false);
  const T=THEMES[themeKey];

  useEffect(()=>{
    const c=store.get("ss-chars");if(c)setCharacters(c);
    const f=store.get("ss-fallen");if(f)setFallenHeroes(f);
    const t=store.get("ss-theme");if(t)setThemeKey(t);
    const a=store.get("ss-auth");
    setView(a?"home":"signin");
  },[]);
  useEffect(()=>{if(view!=="loading")store.set("ss-chars",characters)},[characters]);
  useEffect(()=>{if(view!=="loading")store.set("ss-fallen",fallenHeroes)},[fallenHeroes]);
  useEffect(()=>{if(view!=="loading")store.set("ss-theme",themeKey)},[themeKey]);

  const handleSignIn=()=>{store.set("ss-auth",true);setView("home")};
  const handleStartCapture=()=>setView("capture");
  const handleBack=()=>{setView("home");setDemoMode(false)};
  const handleScan=images=>{setCaptureImages(images);setDemoMode(false);setView("processing")};
  const handleDemoScan=()=>{setDemoMode(true);setView("processing")};
  const handleExtracted=charData=>{const nc=[...characters,charData];setCharacters(nc);setActiveCharIdx(nc.length-1);setActiveIsFallen(false);setView("character")};
  const handleOpenChar=idx=>{setActiveCharIdx(idx);setActiveIsFallen(false);setView("character")};
  const handleOpenFallen=idx=>{setActiveCharIdx(idx);setActiveIsFallen(true);setView("character")};
  const handleSaveChar=d=>{if(activeIsFallen)setFallenHeroes(p=>p.map((c,i)=>i===activeCharIdx?d:c));else setCharacters(p=>p.map((c,i)=>i===activeCharIdx?d:c))};
  const handleDeleteChar=idx=>setCharacters(p=>p.filter((_,i)=>i!==idx));
  const handleArchiveChar=idx=>{const c=characters[idx];setFallenHeroes(p=>[...p,{...c,archivedAt:new Date().toISOString()}]);setCharacters(p=>p.filter((_,i)=>i!==idx))};
  const handleRestoreChar=idx=>{const{archivedAt,...c}=fallenHeroes[idx];setCharacters(p=>[...p,c]);setFallenHeroes(p=>p.filter((_,i)=>i!==idx))};
  const handleDeleteFallen=idx=>setFallenHeroes(p=>p.filter((_,i)=>i!==idx));
  const handleProcessError=()=>{setView("capture");setDemoMode(false)};

  if(view==="loading")return<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#0A0A0C"}}><Logo T={THEMES.darkGold} size={32}/></div>;

  return<div>
    {view==="signin"&&<SignInScreen T={T} onSignIn={handleSignIn}/>}
    {view==="home"&&<HomeScreen T={T} characters={characters} fallenHeroes={fallenHeroes} onStartCapture={handleStartCapture} onOpenChar={handleOpenChar} onOpenFallen={handleOpenFallen} onDeleteChar={handleDeleteChar} onArchiveChar={handleArchiveChar} onRestoreChar={handleRestoreChar} onDeleteFallen={handleDeleteFallen}/>}
    {view==="capture"&&<CaptureScreen T={T} onBack={handleBack} onScan={handleScan} onDemoScan={handleDemoScan}/>}
    {view==="processing"&&<ProcessingScreen T={T} images={captureImages} demoData={demoMode?DEMO_DATA:null} onComplete={handleExtracted} onError={handleProcessError}/>}
    {view==="character"&&activeCharIdx!==null&&<CharacterScreen T={T} character={activeIsFallen?fallenHeroes[activeCharIdx]:characters[activeCharIdx]} isFallen={activeIsFallen} onBack={handleBack} onSave={handleSaveChar} onArchive={activeIsFallen?null:()=>{handleArchiveChar(activeCharIdx);setView("home")}} themeKey={themeKey} setThemeKey={setThemeKey}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<SheetSnap/>);
</script>
</body>
</html>
