<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0A0A0C;font-family:'EB Garamond',Georgia,serif;color:#F2E8D4;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
body,div,button,span,input,p{transition:background-color 0.25s ease,color 0.25s ease,border-color 0.25s ease}
input,button{font-family:inherit}
#root{min-height:100vh}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
/* Emissive "breathing" applied on top of the static stacked text-shadow set per-theme in T.nameGlow */
@keyframes nameGlow{0%,100%{filter:brightness(1) drop-shadow(0 0 6px var(--glow-color,rgba(212,168,67,0.30)))}50%{filter:brightness(1.06) drop-shadow(0 0 16px var(--glow-color,rgba(212,168,67,0.50)))}}
@keyframes subtlePulse{0%,100%{opacity:0.5}50%{opacity:0.8}}
@keyframes scanLine{0%{transform:translateY(-100%)}100%{transform:translateY(100vh)}}
@keyframes pageFadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
/* Slow specular sweep for metallic surfaces */
@keyframes metalSheen{0%{background-position:-180% center}100%{background-position:280% center}}
/* Chip press-in micro feedback */
@keyframes chipPop{0%{transform:scale(.94)}60%{transform:scale(1.03)}100%{transform:scale(1)}}
.atmo-bg{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:0;background-attachment:fixed}
.atmo-bg::before,.atmo-bg::after{content:'';position:absolute;border-radius:50%;pointer-events:none}
#root{position:relative;z-index:1}
/* Fine-tuned easing for interactive accents — chips & tabs expand smoothly */
.ss-chip{transition:transform .34s cubic-bezier(.2,.85,.25,1.05),box-shadow .34s cubic-bezier(.2,.85,.25,1),background .3s ease,color .25s ease,border-color .3s ease,letter-spacing .3s ease}
.ss-chip:active{transform:scale(.95)}
.ss-card{transition:transform .34s cubic-bezier(.2,.85,.25,1),box-shadow .34s cubic-bezier(.2,.85,.25,1)}
.ss-card:active{transform:translateY(1px)}
.ss-press{transition:transform .2s cubic-bezier(.2,.85,.25,1),box-shadow .2s ease,filter .2s ease}
.ss-press:active{transform:translateY(1px) scale(.985);filter:brightness(1.05)}
</style>

<style id="ss-chassis">
#root{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right)}
#root{-webkit-user-select:none;-moz-user-select:none;user-select:none;-webkit-touch-callout:none}
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important;scroll-behavior:auto!important}}
@keyframes ssScan{0%{top:0}100%{top:calc(100% - 3px)}}
@keyframes ssCatIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
#root input,#root textarea,#root select,#root [contenteditable="true"]{-webkit-user-select:text;-moz-user-select:text;user-select:text;-webkit-touch-callout:default}



#ssToast{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 18px);transform:translateX(-50%);z-index:9001;display:none;max-width:88%;padding:12px 18px;border:1px solid #D4A843;border-radius:14px;background:#15131a;color:#F2E8D4;font-family:'EB Garamond',Georgia,serif;font-size:14px;text-align:center;cursor:pointer;box-shadow:0 6px 22px rgba(0,0,0,.55)}
#ssToast.show{display:block;animation:ssRise .35s ease}
#ssUpdate{position:fixed;left:50%;top:calc(env(safe-area-inset-top,0px) + 10px);transform:translateX(-50%);z-index:9100;display:none;align-items:center;gap:8px;max-width:92%;padding:10px 16px;border:1px solid #D4A843;border-radius:14px;background:linear-gradient(135deg,#1a1620,#0A0A0C);color:#F2E8D4;font-family:'Cinzel',Georgia,serif;font-size:14px;font-weight:700;letter-spacing:.3px;cursor:pointer;box-shadow:0 6px 22px rgba(0,0,0,.55),0 0 16px rgba(212,168,67,.3)}
#ssUpdate.show{display:flex;animation:ssRise .35s ease}
#ssUpdate .pill{padding:4px 12px;border-radius:12px;background:#D4A843;color:#0A0A0C;font-size:12px;white-space:nowrap}
@keyframes ssRise{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>

/* ━━━━ CONFIG ━━━━ */
// Replace with your Cloudflare Worker URL when ready
const API_URL = 'https://sheetsnap-api.will-6d6.workers.dev';

// Extraction model. Launch = top-tier Opus high-res vision for max accuracy.
// A/B fallback to benchmark: 'claude-sonnet-4-6' (see roadmap A5).
// NOTE: the Cloudflare Worker MUST lock model + max_tokens + allowed origin
// server-side (audit B1/B3). These client values are a convenience default the
// Worker should override and ignore from the request body.
const MODEL = 'claude-opus-4-6';
const MAX_TOKENS = 8192;

// Hard cap on pages per scan (audit H7 / locked decision). Enforced at capture.
const MAX_PAGES = 10;

/* Downscale a data-URL image to a max long-edge before sending to the API.
   Keeps payload small and predictable (~1568px high-res cap) without hurting
   text legibility. Falls back to the original on any error. */
function downscaleImage(dataUrl, maxDim = 1568, quality = 0.82) {
  return new Promise(resolve => {
    try {
      const img = new Image();
      img.onload = () => {
        let w = img.naturalWidth || img.width,
          h = img.naturalHeight || img.height;
        if (!w || !h) {
          resolve(dataUrl);
          return;
        }
        if (Math.max(w, h) > maxDim) {
          const sc = maxDim / Math.max(w, h);
          w = Math.round(w * sc);
          h = Math.round(h * sc);
        }
        const c = document.createElement("canvas");
        c.width = w;
        c.height = h;
        const ctx = c.getContext("2d");
        if (!ctx) {
          resolve(dataUrl);
          return;
        }
        ctx.drawImage(img, 0, 0, w, h);
        try {
          resolve(c.toDataURL("image/jpeg", quality));
        } catch (e) {
          resolve(dataUrl);
        }
      };
      img.onerror = () => resolve(dataUrl);
      img.src = dataUrl;
    } catch (e) {
      resolve(dataUrl);
    }
  });
}

/* ━━━━ STORAGE ━━━━ */
/* P1 haptics: subtle, sparing vibration on key moments (Android; iOS safely ignores) */
function buzz(p){try{if(navigator.vibrate)navigator.vibrate(p);}catch(_){}}
const store = {
  get: k => {
    try {
      const v = localStorage.getItem(k);
      return v ? JSON.parse(v) : null;
    } catch (e) {
      return null;
    }
  },
  set: (k, v) => {
    try {
      localStorage.setItem(k, JSON.stringify(v));
      return true;
    } catch (e) {
      if (e.name === "QuotaExceededError" || e.code === 22) {
        store._full = true;
      }
      return false;
    }
  },
  _full: false
};

  }
})();
